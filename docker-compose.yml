version: "3.9"

services:
  backend:
    build: ./backend
    container_name: course_builder_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/courses.json:/app/courses.json
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: course_builder_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev -- --host
